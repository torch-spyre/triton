name: Spyre CI

on:
  workflow_dispatch:
    inputs:
      ktir_cpu_ref:
        description: >
          ktir-cpu git ref to install instead of the pin in setup.py (commit SHA,
          branch, or tag). Use this to test against a known-good ref when the
          pinned version has a regression. If the run passes, a success commit
          status is posted so the PR can be merged. Leave blank for a normal run.
        required: false
        default: ""
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  statuses: write
  checks: write

jobs:
  spyre-tests:
    name: Spyre tests
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      # Point uv at the explicit venv created below, so `uv run` and
      # `uv pip` operate on it without manual activation.
      UV_PROJECT_ENVIRONMENT: .venv

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize submodules
        run: |
          git config submodule.third_party/spyre/ktir-mlir-frontend.url https://github.com/torch-spyre/ktir-mlir-frontend.git
          git submodule update --init --recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Create virtual environment
        run: |
          uv venv .venv --python 3.12 --python-preference managed --seed

      - name: Install Triton-Spyre
        env:
          TRITON_BACKENDS: spyre
          MAX_JOBS: "4"
        run: |
          uv pip install -v -e ".[spyre-test]"

      - name: Override ktir-cpu ref
        if: ${{ inputs.ktir_cpu_ref != '' }}
        run: |
          echo "::warning::ktir-cpu pin overridden — installing ref '${{ inputs.ktir_cpu_ref }}' instead of the version pinned in setup.py. If tests pass, a success commit status will be posted to unblock the PR."
          uv pip install --no-deps \
            "ktir-cpu @ git+https://github.com/torch-spyre/ktir-cpu@${{ inputs.ktir_cpu_ref }}"

      - name: Install KTDP MLIR bindings
        run: |
          bash install-ktdp-mlir-bindings.sh

      - name: Run tests
        run: |
          uv run python -m pytest third_party/spyre/test -v -s --tb=short

      # When a ktir-cpu regression blocks a PR from merging, the normal CI run
      # will fail because it installs the pinned (broken) ref from setup.py.
      # The workaround is to trigger this workflow manually with `ktir_cpu_ref`
      # set to a known-good SHA/branch, which installs that ref instead (see
      # "Override ktir-cpu ref" step above).
      #
      # If the tests pass with the override, this step finds the failing
      # "Spyre tests" check run on this commit (posted by the PR-triggered run)
      # and updates it to success via the Check Runs API, which is what the PR
      # merge gate actually watches. Commit statuses (the older API) are a
      # separate system and do not override check runs.
      #
      # The step only runs when `ktir_cpu_ref` is non-empty AND all prior steps
      # succeeded — a failing run never reaches here, so it cannot falsely green
      # a broken commit.
      - name: Update failing check run to success
        if: ${{ success() && inputs.ktir_cpu_ref != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub tokens are scoped to the run that created them — we cannot
          # PATCH a check run owned by a different run (403). Instead we create
          # a new check run with the same name "Spyre tests" and conclusion
          # "success". GitHub uses the most-recent check run per name for the
          # PR merge gate, so this supersedes the failing PR-triggered run.
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/check-runs" \
            -d "{
              \"name\": \"Spyre tests\",
              \"head_sha\": \"${{ github.sha }}\",
              \"status\": \"completed\",
              \"conclusion\": \"success\",
              \"details_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"output\": {
                \"title\": \"Passed with ktir-cpu override: ${{ inputs.ktir_cpu_ref }}\",
                \"summary\": \"Tests passed using ktir-cpu ref '${{ inputs.ktir_cpu_ref }}' instead of the pinned version. See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }
            }"

  docs-patterns:
    name: docs/patterns up to date
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # The pattern-doc generator imports the fixture/test modules to read their
    # static metadata, but it stubs Triton (and gluon_ir) when the compiled
    # extension is absent — so this runs WITHOUT the Spyre build. It needs only
    # the Triton Python package on PYTHONPATH plus numpy + pytest (the fixtures
    # import numpy; the single-pass test files import pytest at module scope).
    # Regenerate locally with gen_patterns_docs.py and commit if this fails.
    env:
      PYTHONPATH: python

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Check docs/patterns up to date
        run: |
          uv run --no-project --with numpy --with pytest \
            python third_party/spyre/scripts/gen_patterns_docs.py --check
